<!DOCTYPE html>
<html lang="ja">

  <title>問い合わせ | StrideWords</title>
  <meta name="description" content="StrideWords への問い合わせやコメントを書き込めるページです。">
  <link rel="stylesheet" href="./styles.css?v=20260425-feature42">
</head>
<body data-community-page="comments">
  <div class="page-shell">
    <nav class="site-nav" aria-label="サイトナビゲーション">
      <a class="nav-brand" href="./index.html">StrideWords</a>
      <div class="nav-links">
        <a href="./index.html">学習ページ</a>
        <a href="./privacy.html">プライバシーポリシー</a>
        <a href="./terms.html">利用規約</a>
        <a href="./contact.html">ご案内</a>
        <a href="./comments.html">問い合わせ</a>
        <a href="./threads.html">チャットページ</a>
      </div>
    </nav>

    <main class="content-area">
      <section class="content-card page-card community-page">
        <p class="eyebrow">Contact</p>
        <h1>問い合わせ</h1>
        <p class="panel-note">
          サイトへの感想、不具合報告、追加してほしい学習内容などを投稿できます。
          返信も同じページ内で確認できます。
        </p>
        <p id="communityStatus" class="community-status notice"></p>

        <form id="communityForm" class="community-form">
          <label>
            <span>名前</span>
            <input id="communityName" type="text" maxlength="40" placeholder="匿名でもOK">
          </label>
          <label>
            <span>コメント</span>
            <textarea id="communityMessage" rows="5" maxlength="1200" placeholder="問い合わせ内容やコメントを書いてください"></textarea>
          </label>
          <button class="primary-button" type="submit">投稿する</button>
        </form>

        <section class="page-section">
          <p class="section-label">コメント履歴</p>
          <div id="communityList" class="community-list"></div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <a class="footer-brand" href="./index.html">StrideWords</a>
      <div class="footer-links">
        <a href="./privacy.html">プライバシーポリシー</a>
        <a href="./terms.html">利用規約</a>
        <a href="./contact.html">ご案内</a>
        <a href="./comments.html">問い合わせ</a>
        <a href="./threads.html">チャットページ</a>
      </div>
    </footer>
